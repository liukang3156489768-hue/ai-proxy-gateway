kind = "web"
previewPath = "/"
title = "API 管理面板"
version = "1.0.0"
id = "dashboard-artifact"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 23183

[services.development]
run = "pnpm --filter @workspace/dashboard run dev"

[services.production]
serve = "static"
build = ["pnpm", "--filter", "@workspace/dashboard", "run", "build"]
publicDir = "artifacts/dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23183"
BASE_PATH = "/"
